bundle:
  name: llmops-databricks-course-yilmazsal

include:
  - resources/*.yml

variables:
  git_sha:
    description: "Git SHA of the deployed commit"
    default: "local"
  branch:
    description: branch
    default: main
  schedule_pause_status:
    description: schedule pause status
    default: PAUSED


artifacts:
  default:
    type: whl
    build: uv build
    path: .

sync:
  include:
    - eval_inputs.txt
    - project_config.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-b1b2f91a-d102.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
  
  acc:
    mode: production
    workspace:
      host: https://dbc-b1b2f91a-d102.cloud.databricks.com
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: PAUSED