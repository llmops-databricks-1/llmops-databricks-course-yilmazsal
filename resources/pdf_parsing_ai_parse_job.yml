resources:
  jobs:
    pdf_parsing_ai_parse_job:
      name: pdf_parsing_ai_parse
      tags:
        project_name: "llmops_databricks"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: run_notebook
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/2.2_pdf_parsing_ai_parse.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
   
  