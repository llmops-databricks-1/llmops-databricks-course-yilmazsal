resources:
  jobs:
    policies_data_ingestion_job:
      name: policies_data_ingestion
      tags:
        project_name: "llmops_databricks"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: policies_data_ingestion
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/0_policies_data_ingestion.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
